{% extends "base.html" %}
{% block title %}Registrarse — Polla del Mundial{% endblock %}

{% block content %}
<div style="max-width:400px;margin:2rem auto;padding:0 1rem">
  <div style="text-align:center;margin-bottom:2rem">
    <div style="font-size:3rem">🇨🇴</div>
    <h1 style="font-size:1.5rem;font-weight:900;margin:0.5rem 0 0.25rem">Únete a la Polla</h1>
    <p style="color:var(--text2);font-size:0.88rem">Crea tu cuenta y empieza a predecir</p>
  </div>

  {% if error %}
    <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <div class="card">
    <form action="/auth/register" method="post">
      <div class="form-field">
        <label class="form-label" for="username">Usuario</label>
        <input type="text" id="username" name="username"
               placeholder="Elige un nombre de usuario" maxlength="50" required autofocus>
      </div>
      <div class="form-field">
        <label class="form-label" for="password">Contraseña</label>
        <input type="password" id="password" name="password"
               placeholder="Elige una contraseña" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem">
        Registrarme
      </button>
    </form>
  </div>

  <p style="text-align:center;margin-top:1.25rem;font-size:0.88rem;color:var(--text2)">
    ¿Ya tienes cuenta?
    <a href="/auth/login" style="color:var(--accent);font-weight:700;text-decoration:none">Inicia sesión</a>
  </p>
</div>
{% endblock %}
