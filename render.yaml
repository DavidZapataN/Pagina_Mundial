services:
  - type: web
    name: polla-mundial
    runtime: docker
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: polla-mundial-db
          property: connectionString
      - key: ADMIN_USERNAME
        value: admin
      - key: DEBUG
        value: "false"
      - key: FOOTBALL_API_KEY
        sync: false

databases:
  - name: polla-mundial-db
    databaseName: polla_mundial
    plan: free
